<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmarks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --surface: rgba(30, 30, 36, 0.88);
      --surface-hover: rgba(45, 45, 55, 0.95);
      --column-surface: rgba(30, 30, 36, 0.45);
      --card: rgba(42, 42, 50, 0.55);
      --card-hover: rgba(55, 55, 68, 0.65);
      --primary: #90caf9;
      --primary-dim: #5c9fd4;
      --text: #e8e8ed;
      --text-dim: #8b8b9a;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 2px 8px rgba(0, 0, 0, 0.35), 0 1px 3px rgba(0, 0, 0, 0.25);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.45);
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center;
      transition: background-image 0.6s ease;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        135deg,
        rgba(10, 10, 18, 0.82) 0%,
        rgba(15, 15, 28, 0.78) 50%,
        rgba(8, 8, 16, 0.85) 100%
      );
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-areas: "main sidebar";
      gap: 1.5rem;
      align-items: stretch;
      padding: 1.5rem;
    }

    /* Header / Clock */
    .header {
      grid-area: sidebar;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      text-align: right;
      gap: 0.75rem;
      height: 100%;
      min-height: 0;
      justify-content: flex-start;
    }

    .clock {
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 200;
      letter-spacing: 0.04em;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
    }

    .header-stack {
      flex: none;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      width: fit-content;
      max-width: 100%;
      align-self: flex-end;
      gap: 0.75rem;
    }

    .clock-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .clock-date {
      font-size: 1.1rem;
      color: var(--text-dim);
      margin-top: 0;
      font-weight: 400;
    }

    @media (min-width: 769px) and (max-width: 1280px) {
      .clock {
        font-size: clamp(2rem, 4.5vw, 3.25rem);
      }

      .clock-date {
        font-size: 0.85rem;
      }
    }

    .notes-wrap {
      width: 100%;
      flex: none;
    }

    .header-toolbar {
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: flex-end;
      width: 100%;
    }

    .toolbar-btn {
      padding: 0.5rem;
      font-size: 1.4rem;
      min-width: 2.5rem;
      justify-content: center;
    }

    .toolbar-text-btn {
      padding: 0.45rem 0.6rem;
      font-size: 0.75rem;
      min-width: 0;
    }

    .btn.toolbar-settings-btn {
      display: none;
    }

    .app.controls-open .btn.toolbar-settings-btn {
      display: inline-flex;
    }

    .notes-checkbox-btn {
      display: none;
    }

    .notes-toggle {
      display: none;
    }

    @media (min-width: 769px) {
      .notes-toggle {
        display: none !important;
      }

      .notes-section {
        display: flex !important;
      }

      .notes-checkbox-btn {
        display: inline-flex;
      }
    }

    .notes-section {
      flex: none;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    .notes-input {
      width: 100%;
      height: 200px;
      min-height: 140px;
      max-height: min(240px, 32vh);
      resize: none;
      overflow-y: auto;
      padding: 0.65rem 0.75rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-sm);
      background: rgba(22, 22, 28, 0.42);
      color: var(--text);
      font-size: 0.85rem;
      line-height: 1.45;
      font-family: inherit;
      backdrop-filter: blur(8px);
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .notes-input::-webkit-scrollbar {
      display: none;
    }

    .notes-input:focus {
      outline: none;
      border-color: rgba(144, 202, 249, 0.5);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      backdrop-filter: blur(8px);
    }

    .btn:hover { background: var(--surface-hover); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }
    .btn:disabled:hover { background: var(--surface); }
    .btn-primary {
      background: rgba(144, 202, 249, 0.15);
      border-color: rgba(144, 202, 249, 0.3);
      color: var(--primary);
    }
    .btn-primary:hover { background: rgba(144, 202, 249, 0.25); }
    .btn-danger { color: #ef9a9a; border-color: rgba(239, 154, 154, 0.3); }
    .btn-danger:hover { background: rgba(239, 154, 154, 0.12); }
    .btn-icon {
      padding: 0.35rem;
      min-width: 2rem;
      justify-content: center;
    }

    /* Columns */
    .columns {
      grid-area: main;
      display: flex;
      gap: 1.25rem;
      height: 100%;
      min-height: 0;
      overflow-x: auto;
      overflow-y: hidden;
      align-items: flex-start;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .columns::-webkit-scrollbar {
      display: none;
    }

    .column {
      flex: 0 0 280px;
      min-width: 260px;
      max-width: 320px;
      max-height: calc(100vh - 3rem);
      background: var(--column-surface);
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
    }

    .column-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .column-drag-handle {
      display: none;
      cursor: grab;
      color: var(--text-dim);
      font-size: 0.85rem;
      letter-spacing: -0.15em;
      user-select: none;
      line-height: 1;
      padding: 0.15rem 0;
    }

    .column-move-buttons {
      display: none;
      gap: 0.15rem;
    }

    .app.controls-open .column-drag-handle {
      display: block;
    }

    .app.controls-open .column-move-buttons {
      display: none;
    }

    .app.controls-open .column.is-dragging {
      opacity: 0.45;
    }

    .app.controls-open .column.is-drag-over {
      outline: 2px dashed rgba(144, 202, 249, 0.55);
      outline-offset: 2px;
    }

    .column-drag-handle:active {
      cursor: grabbing;
    }

    .column-title {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 600;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .column-actions {
      display: none;
      gap: 0.25rem;
    }

    .app.controls-open .column-actions {
      display: flex;
      opacity: 0.75;
    }

    .app.controls-open .column:hover .column-actions {
      opacity: 1;
    }

    .app.controls-open .column-actions .btn-icon {
      font-size: 1rem;
      min-width: 2.25rem;
      padding: 0.4rem;
    }

    .column-body {
      padding: 0.75rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      flex: 1;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .column-body::-webkit-scrollbar {
      display: none;
    }

    .column-empty {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.8rem;
      padding: 1.5rem 0.5rem;
    }

    /* Bookmark Card */
    .card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem;
      background: var(--card);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      text-decoration: none;
      color: inherit;
      position: relative;
    }

    .card:hover {
      background: var(--card-hover);
      box-shadow: var(--shadow-lg);
      transform: translateY(-1px);
    }

    .card-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .card-icon img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .card-icon .fallback {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--primary);
    }

    .card-content {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-size: 0.9rem;
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-url {
      font-size: 0.75rem;
      color: var(--text-dim);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 0.15rem;
    }

    .card-menu {
      display: none;
      gap: 0.15rem;
    }

    .app.controls-open .card-menu {
      display: flex;
    }

    .card-drag-handle {
      display: none;
      cursor: grab;
      color: var(--text-dim);
      font-size: 0.75rem;
      letter-spacing: -0.15em;
      user-select: none;
      line-height: 1;
      flex-shrink: 0;
    }

    .card-move-buttons {
      display: none;
      flex-direction: column;
      gap: 0.1rem;
      flex-shrink: 0;
    }

    .app.controls-open .card-drag-handle {
      display: block;
    }

    .app.controls-open .card-move-buttons {
      display: none;
    }

    .app.controls-open .card.is-dragging {
      opacity: 0.45;
    }

    .app.controls-open .card.is-drag-over {
      outline: 2px dashed rgba(144, 202, 249, 0.55);
      outline-offset: 2px;
    }

    .app.controls-open .card {
      cursor: default;
    }

    .app.controls-open .card:hover {
      transform: none;
    }

    .card-drag-handle:active {
      cursor: grabbing;
    }

    .card-menu button {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 4px;
      font-size: 0.85rem;
      line-height: 1;
    }

    .card-menu button:hover {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
    }

    .add-bookmark-btn {
      width: 100%;
      margin-top: 0.25rem;
      justify-content: center;
      font-size: 0.8rem;
      padding: 0.4rem;
      opacity: 0.7;
      display: none;
    }

    .app.controls-open .add-bookmark-btn {
      display: inline-flex;
    }

    .add-bookmark-btn:hover { opacity: 1; }

    .columns-list {
      display: contents;
    }

    .add-column-btn {
      display: none;
      flex: 0 0 280px;
      min-width: 260px;
      max-width: 320px;
      align-self: flex-start;
      justify-content: center;
      padding: 0.875rem 1rem;
      font-size: 0.85rem;
    }

    .app.controls-open .add-column-btn {
      display: inline-flex;
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      backdrop-filter: blur(4px);
    }

    .modal-backdrop.hidden { display: none; }
    .hidden { display: none !important; }

    .modal {
      background: #1e1e26;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow-lg);
    }

    .modal h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-bottom: 0.35rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
    }

    .form-group input:focus {
      border-color: rgba(144, 202, 249, 0.5);
    }

    .color-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }

    .color-swatch {
      width: 20px;
      height: 20px;
      border: 1px solid transparent;
      border-radius: 4px;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
      transition: border-color 0.15s, transform 0.1s;
    }

    .color-swatch:hover { transform: scale(1.08); }

    .color-swatch.is-selected {
      border-color: #fff;
      box-shadow: 0 0 0 1px rgba(144, 202, 249, 0.7);
    }

    .color-swatch-default {
      background: linear-gradient(135deg, rgba(30, 30, 36, 0.7), rgba(42, 42, 50, 0.7));
      border: 1px solid var(--border);
    }

    .card.has-color:hover {
      background: var(--card-custom-hover) !important;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 1.25rem;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .app {
        display: flex;
        flex-direction: column;
        height: auto;
        min-height: 100vh;
        padding: 1rem;
      }

      .header {
        order: -1;
        align-items: flex-start;
        text-align: left;
        margin-bottom: 0.5rem;
        height: auto;
        flex: none;
      }

      .header-stack {
        width: 100%;
        align-self: stretch;
        flex: none;
      }

      .notes-wrap {
        width: 100%;
      }

      .header-toolbar {
        justify-content: flex-start;
        order: 1;
      }

      .notes-wrap {
        order: 2;
      }

      .notes-toggle {
        display: inline-flex;
      }

      .app.notes-open .notes-checkbox-btn {
        display: inline-flex;
      }

      .notes-section {
        display: none;
      }

      .notes-wrap.is-open .notes-section {
        display: flex;
      }

      .notes-input {
        min-height: 120px;
        max-height: 200px;
        resize: vertical;
      }

      .app.controls-open .column-drag-handle {
        display: none;
      }

      .app.controls-open .column-move-buttons {
        display: flex;
      }

      .app.controls-open .card-drag-handle {
        display: none;
      }

      .app.controls-open .card-move-buttons {
        display: flex;
      }

      .columns {
        height: auto;
        min-height: 0;
        flex-direction: column;
        overflow-x: visible;
      }

      .column {
        flex: none;
        width: 100%;
        max-width: none;
        height: auto;
      }

      .add-column-btn {
        width: 100%;
        max-width: none;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="bg-layer" id="bgLayer"></div>
  <div class="bg-overlay"></div>

  <div class="app">
    <div class="columns">
      <div class="columns-list" id="columnsContainer"></div>
      <button type="button" class="btn btn-primary add-column-btn" id="addColumnBtn">+ Column</button>
    </div>

    <header class="header">
      <div class="header-stack">
        <div class="clock-block">
          <div class="clock" id="clock" aria-live="polite">00:00:00</div>
          <div class="clock-date" id="clockDate"></div>
        </div>
        <div class="notes-wrap" id="notesWrap">
          <div class="notes-section" id="notesSection">
            <textarea
              id="notesInput"
              class="notes-input"
              placeholder="Quick notes…"
              spellcheck="true"
              aria-label="Notes"
            ></textarea>
          </div>
        </div>
        <div class="header-toolbar">
          <button type="button" class="btn toolbar-text-btn toolbar-settings-btn" id="exportBtn" title="Download bookmarks and notes as JSON">Export</button>
          <button type="button" class="btn toolbar-text-btn toolbar-settings-btn" id="importBtn" title="Import bookmarks and notes from JSON">Import</button>
          <button
            type="button"
            class="btn toolbar-btn notes-checkbox-btn"
            id="notesCheckboxBtn"
            aria-label="Toggle line checkbox"
          >✅</button>
          <button
            type="button"
            class="btn toolbar-btn notes-toggle"
            id="notesToggle"
            aria-expanded="false"
            aria-controls="notesSection"
            aria-label="Toggle notes"
          >📝</button>
          <button
            type="button"
            class="btn toolbar-btn controls-toggle"
            id="controlsToggle"
            aria-expanded="false"
            aria-label="Toggle controls"
          >⚙</button>
          <input type="file" id="importFileInput" accept=".json,application/json" hidden>
        </div>
      </div>
    </header>
  </div>

  <div class="modal-backdrop hidden" id="modalBackdrop" role="dialog" aria-modal="true">
    <div class="modal">
      <h2 id="modalTitle">Edit</h2>
      <form id="modalForm">
        <div class="form-group" id="fieldName">
          <label for="inputName">Name</label>
          <input type="text" id="inputName" required autocomplete="off">
        </div>
        <div class="form-group hidden" id="fieldUrl">
          <label for="inputUrl">URL</label>
          <input type="url" id="inputUrl" placeholder="https://example.com" autocomplete="off">
        </div>
        <div class="form-group hidden" id="fieldColor">
          <label id="colorPickerLabel">Color</label>
          <div class="color-picker" id="colorPicker" role="radiogroup" aria-labelledby="colorPickerLabel"></div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn" id="modalCancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="modalSave">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'bookmark-app-data';

    const COLOR_PALETTE = [
      { id: 'red', label: 'Red', rgb: '239, 83, 80' },
      { id: 'deep-orange', label: 'Deep orange', rgb: '255, 87, 34' },
      { id: 'orange', label: 'Orange', rgb: '255, 152, 0' },
      { id: 'amber', label: 'Amber', rgb: '255, 193, 7' },
      { id: 'yellow', label: 'Yellow', rgb: '255, 235, 59' },
      { id: 'lime', label: 'Lime', rgb: '205, 220, 57' },
      { id: 'light-green', label: 'Light green', rgb: '139, 195, 74' },
      { id: 'green', label: 'Green', rgb: '76, 175, 80' },
      { id: 'teal', label: 'Teal', rgb: '0, 150, 136' },
      { id: 'cyan', label: 'Cyan', rgb: '0, 188, 212' },
      { id: 'light-blue', label: 'Light blue', rgb: '3, 169, 244' },
      { id: 'blue', label: 'Blue', rgb: '33, 150, 243' },
      { id: 'indigo', label: 'Indigo', rgb: '63, 81, 181' },
      { id: 'deep-purple', label: 'Deep purple', rgb: '103, 58, 183' },
      { id: 'purple', label: 'Purple', rgb: '156, 39, 176' },
      { id: 'pink', label: 'Pink', rgb: '233, 30, 99' },
      { id: 'rose', label: 'Rose', rgb: '244, 143, 177' },
      { id: 'brown', label: 'Brown', rgb: '121, 85, 72' },
      { id: 'blue-gray', label: 'Blue gray', rgb: '96, 125, 139' },
      { id: 'gray', label: 'Gray', rgb: '158, 158, 158' }
    ];

    let state = loadState();
    let modalMode = null;
    let modalTarget = null;
    let selectedColorId = null;
    let draggedColumnId = null;
    let draggedBookmarkColumnId = null;
    let draggedBookmarkId = null;

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (typeof parsed.notes !== 'string') parsed.notes = '';
          return parsed;
        }
      } catch (_) {}
      return {
        notes: '',
        columns: [
          {
            id: crypto.randomUUID(),
            name: 'Favorites',
            bookmarks: []
          }
        ]
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function isValidColorId(colorId) {
      return COLOR_PALETTE.some((color) => color.id === colorId);
    }

    function normalizeColorId(colorId) {
      return isValidColorId(colorId) ? colorId : null;
    }

    function getPaletteColor(colorId) {
      return COLOR_PALETTE.find((color) => color.id === colorId);
    }

    function mixColorWithDark(rgb, colorWeight, alpha) {
      const parts = rgb.split(',').map((part) => parseInt(part.trim(), 10));
      const darkBase = [22, 22, 28];
      const mixed = parts.map((channel, index) =>
        Math.round(channel * colorWeight + darkBase[index] * (1 - colorWeight))
      );
      return `rgba(${mixed[0]}, ${mixed[1]}, ${mixed[2]}, ${alpha})`;
    }

    function getColumnBackground(colorId) {
      const color = getPaletteColor(colorId);
      if (!color) return null;
      return mixColorWithDark(color.rgb, 0.32, 0.82);
    }

    function getCardBackground(colorId) {
      const color = getPaletteColor(colorId);
      if (!color) return null;
      return mixColorWithDark(color.rgb, 0.38, 0.88);
    }

    function getCardHoverBackground(colorId) {
      const color = getPaletteColor(colorId);
      if (!color) return null;
      return mixColorWithDark(color.rgb, 0.44, 0.92);
    }

    function applyColorField(target, colorId) {
      const normalized = normalizeColorId(colorId);
      if (normalized) {
        target.color = normalized;
        return;
      }
      delete target.color;
    }

    function renderColorPicker(currentColorId) {
      selectedColorId = normalizeColorId(currentColorId);
      const picker = document.getElementById('colorPicker');
      picker.innerHTML = '';

      const defaultSwatch = document.createElement('button');
      defaultSwatch.type = 'button';
      defaultSwatch.className = 'color-swatch color-swatch-default' + (selectedColorId ? '' : ' is-selected');
      defaultSwatch.setAttribute('role', 'radio');
      defaultSwatch.setAttribute('aria-checked', String(!selectedColorId));
      defaultSwatch.setAttribute('aria-label', 'Default');
      defaultSwatch.dataset.colorId = '';
      defaultSwatch.addEventListener('click', () => selectColor(null));
      picker.appendChild(defaultSwatch);

      COLOR_PALETTE.forEach((color) => {
        const swatch = document.createElement('button');
        swatch.type = 'button';
        swatch.className = 'color-swatch' + (selectedColorId === color.id ? ' is-selected' : '');
        swatch.style.background = `rgb(${color.rgb})`;
        swatch.dataset.colorId = color.id;
        swatch.setAttribute('role', 'radio');
        swatch.setAttribute('aria-checked', String(selectedColorId === color.id));
        swatch.setAttribute('aria-label', color.label);
        swatch.addEventListener('click', () => selectColor(color.id));
        picker.appendChild(swatch);
      });
    }

    function selectColor(colorId) {
      selectedColorId = normalizeColorId(colorId);
      document.querySelectorAll('#colorPicker .color-swatch').forEach((swatch) => {
        const swatchColorId = swatch.dataset.colorId || null;
        const isSelected = swatchColorId === selectedColorId;
        swatch.classList.toggle('is-selected', isSelected);
        swatch.setAttribute('aria-checked', String(isSelected));
      });
    }

    function showColorField(currentColorId) {
      document.getElementById('fieldColor').classList.remove('hidden');
      renderColorPicker(currentColorId);
    }

    function hideColorField() {
      document.getElementById('fieldColor').classList.add('hidden');
      selectedColorId = null;
    }

    function buildExportPayload() {
      return {
        version: 1,
        exportedAt: new Date().toISOString(),
        notes: state.notes || '',
        columns: state.columns
      };
    }

    function normalizeImportData(data) {
      if (!data || !Array.isArray(data.columns) || data.columns.length === 0) {
        throw new Error('Invalid file: expected a JSON object with a non-empty "columns" array.');
      }

      return {
        notes: typeof data.notes === 'string' ? data.notes : '',
        columns: data.columns.map((column) => {
          const normalized = {
            id: column.id || crypto.randomUUID(),
            name: String(column.name || 'Untitled').trim() || 'Untitled',
            bookmarks: Array.isArray(column.bookmarks)
              ? column.bookmarks
                  .map((bookmark) => {
                    const item = {
                      id: bookmark.id || crypto.randomUUID(),
                      title: String(bookmark.title || 'Untitled').trim() || 'Untitled',
                      url: String(bookmark.url || '').trim()
                    };
                    const bookmarkColor = normalizeColorId(bookmark.color);
                    if (bookmarkColor) item.color = bookmarkColor;
                    return item;
                  })
                  .filter((bookmark) => bookmark.url)
              : []
          };
          const columnColor = normalizeColorId(column.color);
          if (columnColor) normalized.color = columnColor;
          return normalized;
        })
      };
    }

    function exportBookmarks() {
      const payload = buildExportPayload();
      const json = JSON.stringify(payload, null, 2);
      const blob = new Blob([json], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const date = new Date().toISOString().slice(0, 10);
      const link = document.createElement('a');
      link.href = url;
      link.download = `bookmarks-notes-${date}.json`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function importBookmarks(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          const imported = normalizeImportData(data);
          const columnCount = imported.columns.length;
          const bookmarkCount = imported.columns.reduce(
            (total, column) => total + column.bookmarks.length,
            0
          );

          if (!confirm(`Import ${columnCount} column(s), ${bookmarkCount} bookmark(s), and notes? This replaces your current data.`)) {
            return;
          }

          state = imported;
          saveState();
          document.getElementById('notesInput').value = state.notes || '';
          render();
        } catch (error) {
          alert(error instanceof Error ? error.message : 'Could not import bookmarks.');
        }
      };
      reader.onerror = () => alert('Could not read the selected file.');
      reader.readAsText(file);
    }

    function getDomain(url) {
      try {
        return new URL(url.startsWith('http') ? url : 'https://' + url).hostname.replace(/^www\./, '');
      } catch (_) {
        return url;
      }
    }

    function getFaviconUrl(url) {
      const domain = getDomain(url);
      return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=64`;
    }

    function getInitial(title, url) {
      const source = title || getDomain(url);
      return (source[0] || '?').toUpperCase();
    }

    function initNotes() {
      const input = document.getElementById('notesInput');
      const app = document.querySelector('.app');
      input.value = state.notes || '';

      let saveTimer;
      input.addEventListener('input', () => {
        state.notes = input.value;
        clearTimeout(saveTimer);
        saveTimer = setTimeout(saveState, 300);
      });

      document.getElementById('notesToggle').addEventListener('click', () => {
        const wrap = document.getElementById('notesWrap');
        const toggle = document.getElementById('notesToggle');
        const isOpen = wrap.classList.toggle('is-open');
        toggle.setAttribute('aria-expanded', String(isOpen));
        app.classList.toggle('notes-open', isOpen);
      });

      document.getElementById('notesCheckboxBtn').addEventListener('click', () => {
        toggleNotesLineCheckbox();
      });
    }

    function toggleNotesLineCheckbox() {
      const input = document.getElementById('notesInput');
      const text = input.value;
      const cursor = input.selectionStart;
      const lineStart = text.lastIndexOf('\n', cursor - 1) + 1;
      const lineEndIndex = text.indexOf('\n', cursor);
      const lineEnd = lineEndIndex === -1 ? text.length : lineEndIndex;
      const line = text.slice(lineStart, lineEnd);
      const checkboxPrefix = '✅ ';
      const checkboxPattern = /^(✅ |🔲 |☐ |☑ |☑️ |- \[[ xX]\] |\[[ xX]\] )/;

      let newLine;
      let cursorOffset;

      if (checkboxPattern.test(line)) {
        newLine = line.replace(checkboxPattern, '');
        const removedLength = line.length - newLine.length;
        cursorOffset = Math.max(lineStart, cursor - removedLength);
      } else {
        newLine = checkboxPrefix + line;
        cursorOffset = cursor + checkboxPrefix.length;
      }

      const newText = text.slice(0, lineStart) + newLine + text.slice(lineEnd);
      input.value = newText;
      state.notes = newText;
      saveState();
      input.focus();
      input.setSelectionRange(cursorOffset, cursorOffset);
    }

    /* Clock */
    function updateClock() {
      const now = new Date();
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;

      const dateOpts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('clockDate').textContent = now.toLocaleDateString(undefined, dateOpts);
    }

    /* Background */
    function loadBackground() {
      const seed = Date.now();
      const url = `https://picsum.photos/seed/${seed}/1920/1080`;
      const layer = document.getElementById('bgLayer');
      const img = new Image();
      img.onload = () => { layer.style.backgroundImage = `url('${url}')`; };
      img.src = url;
    }

    /* Render */
    function renderBookmark(columnId, bookmark, bookmarkIndex, bookmarkCount) {
      const domain = getDomain(bookmark.url);
      const favicon = getFaviconUrl(bookmark.url);
      const initial = getInitial(bookmark.title, bookmark.url);

      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.bookmarkId = bookmark.id;
      const cardBackground = getCardBackground(bookmark.color);
      if (cardBackground) {
        card.classList.add('has-color');
        card.style.background = cardBackground;
        card.style.setProperty('--card-custom-hover', getCardHoverBackground(bookmark.color));
      }
      card.innerHTML = `
        <span class="card-drag-handle" draggable="true" aria-label="Drag to reorder bookmark">⋮⋮</span>
        <div class="card-move-buttons">
          <button type="button" class="btn btn-icon" data-action="move-up" aria-label="Move bookmark up">↑</button>
          <button type="button" class="btn btn-icon" data-action="move-down" aria-label="Move bookmark down">↓</button>
        </div>
        <div class="card-icon">
          <img src="${favicon}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <span class="fallback" style="display:none">${initial}</span>
        </div>
        <div class="card-content">
          <div class="card-title">${escapeHtml(bookmark.title)}</div>
          <div class="card-url">${escapeHtml(domain)}</div>
        </div>
        <div class="card-menu">
          <button type="button" data-action="edit" aria-label="Edit bookmark">✎</button>
          <button type="button" data-action="delete" aria-label="Delete bookmark">✕</button>
        </div>
      `;

      const moveUpBtn = card.querySelector('[data-action="move-up"]');
      const moveDownBtn = card.querySelector('[data-action="move-down"]');
      moveUpBtn.disabled = bookmarkIndex === 0;
      moveDownBtn.disabled = bookmarkIndex === bookmarkCount - 1;
      moveUpBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        moveBookmark(columnId, bookmark.id, 'up');
      });
      moveDownBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        moveBookmark(columnId, bookmark.id, 'down');
      });

      card.querySelector('.card-drag-handle').addEventListener('dragstart', (event) => {
        if (!document.querySelector('.app').classList.contains('controls-open')) {
          event.preventDefault();
          return;
        }
        draggedBookmarkColumnId = columnId;
        draggedBookmarkId = bookmark.id;
        event.dataTransfer.effectAllowed = 'move';
        event.dataTransfer.setData('text/plain', bookmark.id);
        card.classList.add('is-dragging');
      });

      card.addEventListener('click', (event) => {
        if (event.target.closest('.card-menu, .card-drag-handle, .card-move-buttons')) return;
        if (document.querySelector('.app').classList.contains('controls-open')) return;
        const href = bookmark.url.startsWith('http') ? bookmark.url : 'https://' + bookmark.url;
        window.open(href, '_blank', 'noopener');
      });

      card.querySelector('[data-action="edit"]').addEventListener('click', (event) => {
        event.stopPropagation();
        openBookmarkModal('edit', columnId, bookmark.id);
      });

      card.querySelector('[data-action="delete"]').addEventListener('click', (event) => {
        event.stopPropagation();
        deleteBookmark(columnId, bookmark.id);
      });

      return card;
    }

    function renderColumn(column) {
      const el = document.createElement('div');
      el.className = 'column';
      el.dataset.columnId = column.id;
      const columnBackground = getColumnBackground(column.color);
      if (columnBackground) {
        el.style.background = columnBackground;
      }

      el.innerHTML = `
        <div class="column-header">
          <span class="column-drag-handle" draggable="true" aria-label="Drag to reorder column">⋮⋮</span>
          <div class="column-move-buttons">
            <button type="button" class="btn btn-icon" data-action="move-up" aria-label="Move column up">↑</button>
            <button type="button" class="btn btn-icon" data-action="move-down" aria-label="Move column down">↓</button>
          </div>
          <span class="column-title">${escapeHtml(column.name)}</span>
          <div class="column-actions">
            <button type="button" class="btn btn-icon" data-action="edit-col" aria-label="Rename column">✎</button>
            <button type="button" class="btn btn-icon btn-danger" data-action="delete-col" aria-label="Delete column">✕</button>
          </div>
        </div>
        <div class="column-body"></div>
      `;

      const columnIndex = state.columns.findIndex((item) => item.id === column.id);
      const moveUpBtn = el.querySelector('[data-action="move-up"]');
      const moveDownBtn = el.querySelector('[data-action="move-down"]');
      moveUpBtn.disabled = columnIndex === 0;
      moveDownBtn.disabled = columnIndex === state.columns.length - 1;
      moveUpBtn.addEventListener('click', () => moveColumn(column.id, 'up'));
      moveDownBtn.addEventListener('click', () => moveColumn(column.id, 'down'));

      el.querySelector('.column-drag-handle').addEventListener('dragstart', (event) => {
        if (!document.querySelector('.app').classList.contains('controls-open')) {
          event.preventDefault();
          return;
        }
        draggedColumnId = column.id;
        event.dataTransfer.effectAllowed = 'move';
        event.dataTransfer.setData('text/plain', column.id);
        el.classList.add('is-dragging');
      });

      const body = el.querySelector('.column-body');

      if (column.bookmarks.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'column-empty';
        empty.textContent = 'No bookmarks yet';
        body.appendChild(empty);
      } else {
        column.bookmarks.forEach((bookmark, index) => {
          body.appendChild(renderBookmark(column.id, bookmark, index, column.bookmarks.length));
        });
      }

      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'btn add-bookmark-btn';
      addBtn.textContent = '+ Bookmark';
      addBtn.addEventListener('click', () => openBookmarkModal('add', column.id));
      body.appendChild(addBtn);

      el.querySelector('[data-action="edit-col"]').addEventListener('click', () => {
        openColumnModal('edit', column.id);
      });

      el.querySelector('[data-action="delete-col"]').addEventListener('click', () => {
        deleteColumn(column.id);
      });

      return el;
    }

    function render() {
      const container = document.getElementById('columnsContainer');
      container.innerHTML = '';
      state.columns.forEach((column) => {
        container.appendChild(renderColumn(column));
      });
    }

    function reorderColumns(sourceId, targetId) {
      const sourceIndex = state.columns.findIndex((column) => column.id === sourceId);
      const targetIndex = state.columns.findIndex((column) => column.id === targetId);
      if (sourceIndex === -1 || targetIndex === -1 || sourceIndex === targetIndex) return;

      const [movedColumn] = state.columns.splice(sourceIndex, 1);
      state.columns.splice(targetIndex, 0, movedColumn);
      saveState();
      render();
    }

    function moveColumn(columnId, direction) {
      const index = state.columns.findIndex((column) => column.id === columnId);
      const targetIndex = direction === 'up' ? index - 1 : index + 1;
      if (index === -1 || targetIndex < 0 || targetIndex >= state.columns.length) return;

      const [movedColumn] = state.columns.splice(index, 1);
      state.columns.splice(targetIndex, 0, movedColumn);
      saveState();
      render();
    }

    function reorderBookmarks(columnId, sourceId, targetId) {
      const column = state.columns.find((item) => item.id === columnId);
      const sourceIndex = column.bookmarks.findIndex((bookmark) => bookmark.id === sourceId);
      const targetIndex = column.bookmarks.findIndex((bookmark) => bookmark.id === targetId);
      if (sourceIndex === -1 || targetIndex === -1 || sourceIndex === targetIndex) return;

      const [movedBookmark] = column.bookmarks.splice(sourceIndex, 1);
      column.bookmarks.splice(targetIndex, 0, movedBookmark);
      saveState();
      render();
    }

    function moveBookmark(columnId, bookmarkId, direction) {
      const column = state.columns.find((item) => item.id === columnId);
      const index = column.bookmarks.findIndex((bookmark) => bookmark.id === bookmarkId);
      const targetIndex = direction === 'up' ? index - 1 : index + 1;
      if (index === -1 || targetIndex < 0 || targetIndex >= column.bookmarks.length) return;

      const [movedBookmark] = column.bookmarks.splice(index, 1);
      column.bookmarks.splice(targetIndex, 0, movedBookmark);
      saveState();
      render();
    }

    function clearBookmarkDragState() {
      draggedBookmarkColumnId = null;
      draggedBookmarkId = null;
      document.querySelectorAll('.card.is-dragging, .card.is-drag-over').forEach((card) => {
        card.classList.remove('is-dragging', 'is-drag-over');
      });
    }

    function clearColumnDragState() {
      draggedColumnId = null;
      document.querySelectorAll('.column.is-dragging, .column.is-drag-over').forEach((column) => {
        column.classList.remove('is-dragging', 'is-drag-over');
      });
    }

    function setupColumnDragDrop() {
      const container = document.getElementById('columnsContainer');

      container.addEventListener('dragover', (event) => {
        if (draggedBookmarkId) return;
        if (!draggedColumnId || !document.querySelector('.app').classList.contains('controls-open')) return;
        event.preventDefault();
        event.dataTransfer.dropEffect = 'move';

        const targetColumn = event.target.closest('.column');
        document.querySelectorAll('.column.is-drag-over').forEach((column) => {
          column.classList.remove('is-drag-over');
        });
        if (targetColumn && targetColumn.dataset.columnId !== draggedColumnId) {
          targetColumn.classList.add('is-drag-over');
        }
      });

      container.addEventListener('drop', (event) => {
        if (draggedBookmarkId) return;
        if (!draggedColumnId) return;
        event.preventDefault();

        const targetColumn = event.target.closest('.column');
        if (targetColumn) {
          reorderColumns(draggedColumnId, targetColumn.dataset.columnId);
        }
        clearColumnDragState();
      });

      container.addEventListener('dragend', clearColumnDragState);
    }

    function setupBookmarkDragDrop() {
      const container = document.getElementById('columnsContainer');

      container.addEventListener('dragover', (event) => {
        if (!draggedBookmarkId || !document.querySelector('.app').classList.contains('controls-open')) return;

        const targetCard = event.target.closest('.card');
        const targetColumn = event.target.closest('.column');
        if (!targetCard || !targetColumn) return;
        if (targetColumn.dataset.columnId !== draggedBookmarkColumnId) return;
        if (targetCard.dataset.bookmarkId === draggedBookmarkId) return;

        event.preventDefault();
        event.stopPropagation();
        event.dataTransfer.dropEffect = 'move';

        document.querySelectorAll('.card.is-drag-over').forEach((card) => {
          card.classList.remove('is-drag-over');
        });
        targetCard.classList.add('is-drag-over');
      });

      container.addEventListener('drop', (event) => {
        if (!draggedBookmarkId) return;

        const targetCard = event.target.closest('.card');
        const targetColumn = event.target.closest('.column');
        if (
          targetCard &&
          targetColumn &&
          targetColumn.dataset.columnId === draggedBookmarkColumnId &&
          targetCard.dataset.bookmarkId !== draggedBookmarkId
        ) {
          event.preventDefault();
          event.stopPropagation();
          reorderBookmarks(
            draggedBookmarkColumnId,
            draggedBookmarkId,
            targetCard.dataset.bookmarkId
          );
        }
        clearBookmarkDragState();
      });

      container.addEventListener('dragend', (event) => {
        if (event.target.closest('.card-drag-handle')) {
          clearBookmarkDragState();
        }
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    /* CRUD */
    function openColumnModal(mode, columnId) {
      modalMode = mode === 'add' ? 'add-column' : 'edit-column';
      modalTarget = { columnId };
      document.getElementById('modalTitle').textContent = mode === 'add' ? 'Add Column' : 'Rename Column';
      document.getElementById('fieldName').classList.remove('hidden');
      document.getElementById('fieldUrl').classList.add('hidden');
      const column = mode === 'edit' ? state.columns.find((col) => col.id === columnId) : null;
      document.getElementById('inputName').value = column ? column.name : '';
      showColorField(column ? column.color : null);
      showModal();
      document.getElementById('inputName').focus();
    }

    function openBookmarkModal(mode, columnId, bookmarkId) {
      modalMode = mode === 'add' ? 'add-bookmark' : 'edit-bookmark';
      modalTarget = { columnId, bookmarkId };
      document.getElementById('modalTitle').textContent = mode === 'add' ? 'Add Bookmark' : 'Edit Bookmark';
      document.getElementById('fieldName').classList.remove('hidden');
      document.getElementById('fieldUrl').classList.remove('hidden');

      if (mode === 'edit') {
        const column = state.columns.find((col) => col.id === columnId);
        const bookmark = column.bookmarks.find((item) => item.id === bookmarkId);
        document.getElementById('inputName').value = bookmark.title;
        document.getElementById('inputUrl').value = bookmark.url;
        showColorField(bookmark.color);
      } else {
        document.getElementById('inputName').value = '';
        document.getElementById('inputUrl').value = '';
        showColorField(null);
      }

      showModal();
      document.getElementById('inputName').focus();
    }

    function showModal() {
      document.getElementById('modalBackdrop').classList.remove('hidden');
    }

    function hideModal() {
      document.getElementById('modalBackdrop').classList.add('hidden');
      hideColorField();
      modalMode = null;
      modalTarget = null;
    }

    function handleModalSubmit(event) {
      event.preventDefault();
      const name = document.getElementById('inputName').value.trim();
      const url = document.getElementById('inputUrl').value.trim();

      if (modalMode === 'add-column' || modalMode === 'edit-column') {
        if (!name) return;
        if (modalMode === 'add-column') {
          const column = { id: crypto.randomUUID(), name, bookmarks: [] };
          applyColorField(column, selectedColorId);
          state.columns.push(column);
        } else {
          const column = state.columns.find((col) => col.id === modalTarget.columnId);
          column.name = name;
          applyColorField(column, selectedColorId);
        }
      }

      if (modalMode === 'add-bookmark' || modalMode === 'edit-bookmark') {
        if (!name || !url) return;
        const column = state.columns.find((col) => col.id === modalTarget.columnId);
        if (modalMode === 'add-bookmark') {
          const bookmark = { id: crypto.randomUUID(), title: name, url };
          applyColorField(bookmark, selectedColorId);
          column.bookmarks.push(bookmark);
        } else {
          const bookmark = column.bookmarks.find((item) => item.id === modalTarget.bookmarkId);
          bookmark.title = name;
          bookmark.url = url;
          applyColorField(bookmark, selectedColorId);
        }
      }

      saveState();
      render();
      hideModal();
    }

    function deleteColumn(columnId) {
      if (state.columns.length <= 1) {
        alert('You need at least one column.');
        return;
      }
      const column = state.columns.find((col) => col.id === columnId);
      if (!confirm(`Delete column "${column.name}" and all its bookmarks?`)) return;
      state.columns = state.columns.filter((col) => col.id !== columnId);
      saveState();
      render();
    }

    function deleteBookmark(columnId, bookmarkId) {
      const column = state.columns.find((col) => col.id === columnId);
      const bookmark = column.bookmarks.find((item) => item.id === bookmarkId);
      if (!confirm(`Delete bookmark "${bookmark.title}"?`)) return;
      column.bookmarks = column.bookmarks.filter((item) => item.id !== bookmarkId);
      saveState();
      render();
    }

    /* Init */
    document.getElementById('addColumnBtn').addEventListener('click', () => {
      modalMode = 'add-column';
      modalTarget = {};
      document.getElementById('modalTitle').textContent = 'Add Column';
      document.getElementById('fieldName').classList.remove('hidden');
      document.getElementById('fieldUrl').classList.add('hidden');
      document.getElementById('inputName').value = '';
      showColorField(null);
      showModal();
      document.getElementById('inputName').focus();
    });

    document.getElementById('exportBtn').addEventListener('click', exportBookmarks);
    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('importFileInput').click();
    });
    document.getElementById('importFileInput').addEventListener('change', (event) => {
      const file = event.target.files[0];
      event.target.value = '';
      if (file) importBookmarks(file);
    });

    document.getElementById('controlsToggle').addEventListener('click', () => {
      const toggle = document.getElementById('controlsToggle');
      const app = document.querySelector('.app');
      const isOpen = app.classList.toggle('controls-open');
      toggle.setAttribute('aria-expanded', String(isOpen));
    });

    document.getElementById('modalCancel').addEventListener('click', hideModal);
    document.getElementById('modalForm').addEventListener('submit', handleModalSubmit);

    document.getElementById('modalBackdrop').addEventListener('click', (event) => {
      if (event.target === event.currentTarget) hideModal();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') hideModal();
    });

    updateClock();
    setInterval(updateClock, 1000);
    loadBackground();
    initNotes();
    setupColumnDragDrop();
    setupBookmarkDragDrop();
    render();
  </script>
</body>
</html>
